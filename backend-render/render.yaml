services:
  - type: web
    name: dpi-engine-api
    env: python
    plan: free
    rootDir: backend-render
    buildCommand: |
      cd backend && mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release && cmake --build . --config Release
      pip install -r ../requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_ORIGIN
        sync: false
