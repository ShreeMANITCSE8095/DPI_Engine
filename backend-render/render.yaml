services:
  - type: web
    name: dpi-engine-api
    env: python
    plan: free
    rootDir: backend-render
    buildCommand: |
      pip install -r requirements.txt
      cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      cmake --build build --config Release
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_ORIGIN
        sync: false
